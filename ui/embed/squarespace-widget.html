<!--
  OpenClaw Chat Widget — Squarespace Code Injection Snippet
  ─────────────────────────────────────────────────────────
  SETUP (do this before pasting):

  1. Make your gateway publicly reachable (it must be on HTTPS/WSS if Squarespace
     is HTTPS — which it always is). Options:
       • Deploy on a VPS behind nginx with a TLS cert (recommended)
       • Use Cloudflare Tunnel: cloudflared tunnel --url http://localhost:18789
       • Use ngrok: ngrok http 18789

  2. Get your auth token:
       pnpm openclaw config get gateway.auth.token

  3. Allow your Squarespace origin in your gateway config:
       pnpm openclaw config set gateway.controlUi.allowedOrigins '["https://www.yoursite.squarespace.com"]'
     Then restart the gateway (via the OpenClaw Mac app or scripts/restart-mac.sh).

  4. Fill in the CONFIG block below, then paste the entire file content into:
       Squarespace → Settings → Advanced → Code Injection → Footer

  NOTES:
  • Each website visitor gets their own private session (stored in browser localStorage).
  • The auth token will be visible in page source — anyone can connect and chat with
    your AI, which is intentional for a public chat widget. Use a gateway firewall/
    IP allowlist if you want to restrict access further.
  • Requires a modern browser (Chrome 113+, Firefox 130+, Safari 17+) for the
    device-identity crypto. Older browsers fall back to token-only auth.
-->

<style id="openclaw-widget-styles">
  :root {
    --ocw-primary: #4F46E5;
    --ocw-primary-dark: #4338CA;
    --ocw-bg: #ffffff;
    --ocw-surface: #f9fafb;
    --ocw-border: #e5e7eb;
    --ocw-text: #111827;
    --ocw-text-muted: #6b7280;
    --ocw-user-bubble: #4F46E5;
    --ocw-user-text: #ffffff;
    --ocw-bot-bubble: #f3f4f6;
    --ocw-bot-text: #111827;
    --ocw-radius: 16px;
    --ocw-shadow: 0 20px 60px rgba(0,0,0,0.18);
    --ocw-z: 999999;
  }
  #ocw-btn {
    position: fixed; bottom: 24px; right: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--ocw-primary); color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(79,70,229,0.4);
    z-index: var(--ocw-z);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #ocw-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(79,70,229,0.55); }
  #ocw-btn svg { width: 26px; height: 26px; pointer-events: none; }
  #ocw-panel {
    position: fixed; bottom: 92px; right: 24px;
    width: 360px; max-width: calc(100vw - 32px);
    height: 520px; max-height: calc(100vh - 120px);
    background: var(--ocw-bg); border-radius: var(--ocw-radius);
    box-shadow: var(--ocw-shadow); border: 1px solid var(--ocw-border);
    display: flex; flex-direction: column; overflow: hidden;
    z-index: var(--ocw-z);
    transform: scale(0.95) translateY(10px); opacity: 0; pointer-events: none;
    transition: transform 0.22s ease, opacity 0.22s ease;
  }
  #ocw-panel.ocw-open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
  #ocw-header {
    background: var(--ocw-primary); color: #fff;
    padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  #ocw-avatar {
    width: 36px; height: 36px; background: rgba(255,255,255,0.2);
    border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #ocw-avatar svg { width: 20px; height: 20px; }
  #ocw-hinfo { flex: 1; min-width: 0; }
  #ocw-hname { font-weight: 600; font-size: 15px; }
  #ocw-hstatus { font-size: 12px; opacity: 0.8; margin-top: 1px; }
  #ocw-close {
    background: none; border: none; color: #fff; cursor: pointer;
    padding: 5px; border-radius: 6px; opacity: 0.75;
    display: flex; align-items: center; flex-shrink: 0;
  }
  #ocw-close:hover { opacity: 1; background: rgba(255,255,255,0.15); }
  #ocw-close svg { width: 18px; height: 18px; }
  #ocw-messages {
    flex: 1; overflow-y: auto; padding: 14px 14px 8px;

    background: var(--ocw-surface);
  }
  #ocw-messages::-webkit-scrollbar { width: 4px; }
  #ocw-messages::-webkit-scrollbar-track { background: transparent; }
  #ocw-messages::-webkit-scrollbar-thumb { background: var(--ocw-border); border-radius: 4px; }
  .ocw-msg { display: flex; flex-direction: column; max-width: 82%; gap: 3px; }
  .ocw-msg.ocw-user { align-self: flex-end; align-items: flex-end; }
  .ocw-msg.ocw-bot  { align-self: flex-start; align-items: flex-start; }
  .ocw-bubble {
    padding: 9px 13px; border-radius: 16px;
    font-size: 14px; line-height: 1.5; word-break: break-word;
  }
  .ocw-user .ocw-bubble {
    background: var(--ocw-user-bubble); color: var(--ocw-user-text);

  }
  .ocw-bot .ocw-bubble {

  .ocw-ts { font-size: 11px; color: var(--ocw-text-muted); margin: 0 3px; }
  .ocw-typing-bubble { display: flex; gap: 5px; align-items: center; padding: 12px 15px; }
  .ocw-typing-bubble span {
    width: 7px; height: 7px; background: var(--ocw-text-muted);

  @keyframes ocw-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }
  #ocw-footer {
    padding: 10px 12px; border-top: 1px solid var(--ocw-border);
    display: flex; gap: 8px; align-items: flex-end; background: var(--ocw-bg); flex-shrink: 0;
  }
  #ocw-input {
    flex: 1; padding: 9px 13px; border: 1px solid var(--ocw-border);
    border-radius: 22px; font-size: 14px; outline: none;
    color: var(--ocw-text); background: var(--ocw-surface);
    resize: none; font-family: inherit; line-height: 1.45;
    max-height: 100px; overflow-y: auto;
  }
  #ocw-input:focus { border-color: var(--ocw-primary); }
  #ocw-input::placeholder { color: var(--ocw-text-muted); }
  #ocw-send {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--ocw-primary); color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.15s; margin-bottom: 1px;
  }
  #ocw-send:hover:not(:disabled) { background: var(--ocw-primary-dark); }
  #ocw-send:disabled { background: var(--ocw-border); cursor: not-allowed; }
  #ocw-send svg { width: 17px; height: 17px; }
</style>

<script>
(async function () {
  'use strict';

  /* ═══════════════════════════════════════════════════
     CONFIGURATION — edit these values before deploying
     ═══════════════════════════════════════════════════ */
  const CFG = {
    // Cloudflare Tunnel URL — already running on your Mac.
    // Note: trycloudflare.com tunnels reset on restart; re-run the tunnel
    // and update this URL if it changes.
    gatewayUrl: 'wss://compliance-funk-trusts-districts.trycloudflare.com',

    // Gateway auth token
    authToken: '185b227fd80b14772831bb0144812e21fe6de51997596377',

    // Display name shown in the chat header
    botName: 'Assistant',

    // First message shown to new visitors (no prior chat history)
    welcomeMessage: 'Hi! How can I help you today?',

    // Brand color (hex). Applied to the button, header, and user bubbles.
    primaryColor: '#4F46E5',
  };
  /* ═══════════════════════════════════════════════════ */

  // ── Color helpers ──────────────────────────────────────────────────────────
  function shiftColor(hex, delta) {
    const n = parseInt(hex.replace('#', ''), 16);
    const clamp = v => Math.min(255, Math.max(0, v + delta));
    const r = clamp(n >> 16), g = clamp((n >> 8) & 0xff), b = clamp(n & 0xff);
    return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
  }
  const root = document.documentElement.style;
  root.setProperty('--ocw-primary', CFG.primaryColor);
  root.setProperty('--ocw-primary-dark', shiftColor(CFG.primaryColor, -20));
  root.setProperty('--ocw-user-bubble', CFG.primaryColor);
  document.getElementById('ocw-hname').textContent = CFG.botName;

  // ── Base64-url helpers ─────────────────────────────────────────────────────
  function b64uEncode(bytes) {
    let bin = '';
    for (const b of bytes) bin += String.fromCharCode(b);
    return btoa(bin).replaceAll('+', '-').replaceAll('/', '_').replace(/=+$/, '');
  }
  function b64uDecode(str) {
    const s = str.replaceAll('-', '+').replaceAll('_', '/');
    const padded = s + '='.repeat((4 - s.length % 4) % 4);
    const bin = atob(padded);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  async function sha256Hex(bytes) {
    const buf = bytes.buffer ? bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength) : bytes;
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  function genUUID() {
    if (typeof crypto.randomUUID === 'function') return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  // ── Device identity (Ed25519 via Web Crypto API) ───────────────────────────
  // Each browser gets a persistent keypair stored in localStorage.
  // This mirrors how the OpenClaw Control UI authenticates.
  const DEVICE_STORAGE_KEY = 'openclaw-widget-device-v1';
  let _device = null;

  async function loadOrCreateDevice() {
    if (_device) return _device;
    const ALG = { name: 'Ed25519' };

    // Try to load existing identity from localStorage
    try {
      const raw = localStorage.getItem(DEVICE_STORAGE_KEY);
      if (raw) {
        const stored = JSON.parse(raw);
        if (stored?.version === 1 && stored.publicKey && stored.privateKey) {
          const publicKey  = await crypto.subtle.importKey('raw',   b64uDecode(stored.publicKey),  ALG, false, ['verify']);
          const privateKey = await crypto.subtle.importKey('pkcs8', b64uDecode(stored.privateKey), ALG, false, ['sign']);
          _device = { deviceId: stored.deviceId, publicKeyB64: stored.publicKey, publicKey, privateKey };
          return _device;
        }
      }
    } catch { /* fall through to regenerate */ }

    // Generate a new keypair
    const kp = await crypto.subtle.generateKey(ALG, true, ['sign', 'verify']);
    const pubRaw  = new Uint8Array(await crypto.subtle.exportKey('raw',   kp.publicKey));
    const privDer = new Uint8Array(await crypto.subtle.exportKey('pkcs8', kp.privateKey));
    const deviceId    = await sha256Hex(pubRaw);
    const publicKeyB64  = b64uEncode(pubRaw);
    const privateKeyB64 = b64uEncode(privDer);
    localStorage.setItem(DEVICE_STORAGE_KEY, JSON.stringify({
      version: 1, deviceId, publicKey: publicKeyB64, privateKey: privateKeyB64,
    }));
    _device = { deviceId, publicKeyB64, publicKey: kp.publicKey, privateKey: kp.privateKey };
    return _device;
  }

  async function signPayload(privateKey, payload) {
    const sig = await crypto.subtle.sign({ name: 'Ed25519' }, privateKey, new TextEncoder().encode(payload));
    return b64uEncode(new Uint8Array(sig));
  }

  // Matches src/gateway/device-auth.ts buildDeviceAuthPayload
  function buildAuthPayload({ deviceId, clientId, clientMode, role, scopes, signedAtMs, token, nonce }) {
    return ['v2', deviceId, clientId, clientMode, role, scopes.join(','), String(signedAtMs), token ?? '', nonce ?? ''].join('|');
  }

  // ── Device-token cache (avoids re-signing on every reconnect) ─────────────
  const DTOKEN_KEY = 'openclaw-widget-dtoken-v1';
  function loadDeviceToken(deviceId) {
    try {
      const p = JSON.parse(localStorage.getItem(DTOKEN_KEY) ?? 'null');
      return p?.deviceId === deviceId ? p.token : null;
    } catch { return null; }
  }
  function saveDeviceToken(deviceId, token) {
    localStorage.setItem(DTOKEN_KEY, JSON.stringify({ deviceId, token }));
  }

  // ── Per-visitor session key ────────────────────────────────────────────────
  const SESSION_STORAGE_KEY = 'openclaw-widget-session-v1';
  function getOrCreateSessionKey() {
    let key = localStorage.getItem(SESSION_STORAGE_KEY);
    if (!key) { key = 'web-visitor-' + genUUID(); localStorage.setItem(SESSION_STORAGE_KEY, key); }
    return key;
  }

  // ── Gateway WebSocket client ───────────────────────────────────────────────
  const CLIENT_ID   = 'openclaw-embed-widget';
  const CLIENT_MODE = 'webchat';
  const ROLE        = 'operator';
  const SCOPES      = ['operator.admin', 'operator.approvals', 'operator.pairing'];

  let ws            = null;
  let pendingReqs   = new Map();  // id → {resolve, reject}
  let connectNonce  = null;
  let connectSent   = false;
  let wsDestroyed   = false;
  let isConnected   = false;
  let backoffMs     = 800;
  const sessionKey  = getOrCreateSessionKey();

  function wsSend(obj) {
    if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }
  function wsRequest(method, params) {
    return new Promise((resolve, reject) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return reject(new Error('not connected'));
      const id = genUUID();
      pendingReqs.set(id, { resolve, reject });
      wsSend({ type: 'req', id, method, params });
    });
  }
  function flushPending(err) {
    for (const p of pendingReqs.values()) p.reject(err);
    pendingReqs.clear();
  }

  async function sendConnect() {
    if (connectSent) return;
    connectSent = true;

    // Check for Web Crypto Ed25519 support (Chrome 113+, Firefox 130+, Safari 17+)
    const hasEd25519 = typeof crypto !== 'undefined' && !!crypto.subtle &&
      await crypto.subtle.generateKey({ name: 'Ed25519' }, false, ['sign']).then(() => true).catch(() => false);

    let deviceParam  = undefined;
    let authToken    = CFG.authToken;

    if (hasEd25519) {
      const device      = await loadOrCreateDevice();
      const cachedToken = loadDeviceToken(device.deviceId);
      if (cachedToken) authToken = cachedToken;

      const signedAtMs = Date.now();
      const nonce      = connectNonce ?? undefined;
      const payload    = buildAuthPayload({
        deviceId: device.deviceId, clientId: CLIENT_ID, clientMode: CLIENT_MODE,
        role: ROLE, scopes: SCOPES, signedAtMs, token: authToken, nonce,
      });
      const signature = await signPayload(device.privateKey, payload);
      deviceParam = { id: device.deviceId, publicKey: device.publicKeyB64, signature, signedAt: signedAtMs, nonce };
    }

    const params = {
      minProtocol: 3, maxProtocol: 3,
      client: { id: CLIENT_ID, version: '1.0.0', platform: 'web', mode: CLIENT_MODE },
      role: ROLE, scopes: SCOPES,
      ...(deviceParam ? { device: deviceParam } : {}),
      auth: { token: authToken },
      caps: [],
      userAgent: navigator.userAgent,
      locale:    navigator.language,
    };

    wsRequest('connect', params)
      .then(hello => {
        if (hello?.auth?.deviceToken && deviceParam) saveDeviceToken(deviceParam.id, hello.auth.deviceToken);
        backoffMs   = 800;
        isConnected = true;
        setStatus('online');
        void loadHistory();
      })
      .catch(() => ws?.close(4008, 'connect failed'));
  }

  function handleWsMessage(raw) {
    let frame;
    try { frame = JSON.parse(raw); } catch { return; }

    if (frame.type === 'event') {
      if (frame.event === 'connect.challenge') {
        const nonce = frame.payload?.nonce;
        if (typeof nonce === 'string') { connectNonce = nonce; void sendConnect(); }
        return;
      }
      handleEvent(frame);
      return;
    }
    if (frame.type === 'res') {
      const p = pendingReqs.get(frame.id);
      if (!p) return;
      pendingReqs.delete(frame.id);
      frame.ok ? p.resolve(frame.payload) : p.reject(new Error(frame.error?.message ?? 'request failed'));
    }
  }

  function wsConnect() {
    if (wsDestroyed) return;
    try { ws = new WebSocket(CFG.gatewayUrl); } catch { scheduleReconnect(); return; }
    ws.addEventListener('open', () => {
      connectNonce = null; connectSent = false;
      // Gateway sends connect.challenge immediately; fall back after 750 ms in case it doesn't
      setTimeout(() => { if (!connectSent) void sendConnect(); }, 750);
    });
    ws.addEventListener('message', ev => handleWsMessage(String(ev.data ?? '')));
    ws.addEventListener('close', () => {
      ws = null; isConnected = false;
      flushPending(new Error('disconnected'));
      setStatus('reconnecting');
      scheduleReconnect();
    });
    ws.addEventListener('error', () => {}); // close always fires after error
  }
  function scheduleReconnect() {
    if (!wsDestroyed) setTimeout(wsConnect, backoffMs = Math.min(backoffMs * 1.7, 15_000));
  }

  // ── Chat history + events ──────────────────────────────────────────────────
  async function loadHistory() {
    try {
      const result = await wsRequest('chat.history', { sessionKey, limit: 50 });
      const msgs = result?.messages ?? [];
      messagesEl.innerHTML = '';
      if (msgs.length === 0) {
        appendMsg('bot', CFG.welcomeMessage);
      } else {
        for (const m of msgs) {
          const role = m?.role === 'user' ? 'user' : 'bot';
          const text = extractText(m);
          if (text) appendMsg(role, text, m?.createdAt);
        }
      }
    } catch {
      messagesEl.innerHTML = '';
      appendMsg('bot', CFG.welcomeMessage);
    }
    updateSendBtn();
  }

  function handleEvent(frame) {
    if (frame.event !== 'chat') return;
    const p = frame.payload;
    if (!p || p.sessionKey !== sessionKey) return;

    if (p.state === 'delta') {
      showTyping();
    } else if (p.state === 'final') {
      hideTyping();
      const text = extractText(p.message);
      if (text) appendMsg('bot', text);
    } else if (p.state === 'error' || p.state === 'aborted') {
      hideTyping();
      if (p.state === 'error') appendMsg('bot', 'Sorry, something went wrong. Please try again.');
    }
  }

  function extractText(msg) {
    if (!msg) return '';
    if (typeof msg === 'string') return msg;
    if (typeof msg.content === 'string') return msg.content;
    if (Array.isArray(msg.content)) return msg.content.filter(c => c?.type === 'text').map(c => c.text ?? '').join('');
    if (typeof msg.text === 'string') return msg.text;
    return '';
  }

  // ── UI ─────────────────────────────────────────────────────────────────────
  const panel      = document.getElementById('ocw-panel');
  const openBtn    = document.getElementById('ocw-btn');
  const messagesEl = document.getElementById('ocw-messages');
  const inputEl    = document.getElementById('ocw-input');
  const sendBtn    = document.getElementById('ocw-send');
  const statusEl   = document.getElementById('ocw-hstatus');
  let   isOpen     = false;
  let   typingEl   = null;

  openBtn.addEventListener('click', () => togglePanel());
  document.getElementById('ocw-close').addEventListener('click', () => togglePanel(false));

  inputEl.addEventListener('input', () => {
    updateSendBtn();
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); void trySend(); }
  });
  sendBtn.addEventListener('click', () => void trySend());

  function togglePanel(open) {
    isOpen = open ?? !isOpen;
    panel.classList.toggle('ocw-open', isOpen);
    openBtn.setAttribute('aria-expanded', String(isOpen));
    if (isOpen) { inputEl.focus(); scrollBottom(); }
  }

  function setStatus(s) {
    statusEl.textContent = { online: 'Online', reconnecting: 'Reconnecting…', connecting: 'Connecting…' }[s] ?? s;
    updateSendBtn();
  }

  function updateSendBtn() {
    sendBtn.disabled = !isConnected || !inputEl.value.trim();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function fmtTime(ms) {
    return new Date(ms ?? Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function appendMsg(role, text, ts) {
    const div = document.createElement('div');
    div.className = `ocw-msg ocw-${role}`;
    div.innerHTML = `<div class="ocw-bubble">${escHtml(text)}</div><span class="ocw-ts">${fmtTime(ts)}</span>`;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    if (typingEl) return;
    typingEl = document.createElement('div');
    typingEl.className = 'ocw-msg ocw-bot';
    typingEl.innerHTML = '<div class="ocw-bubble ocw-typing-bubble"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(typingEl);
    scrollBottom();
  }
  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  async function trySend() {
    const text = inputEl.value.trim();
    if (!text || !isConnected) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    updateSendBtn();
    appendMsg('user', text);
    showTyping();
    try {
      await wsRequest('chat.send', { sessionKey, message: text, idempotencyKey: genUUID() });
      // Typing indicator stays until a 'final' event arrives
    } catch {
      hideTyping();
      appendMsg('bot', 'Sorry, something went wrong. Please try again.');
    }
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  setStatus('connecting');
  wsConnect();
})();
</script>
